<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Archive — The Last Engineer</title>
  <meta name="description" content="Browse all past issues of The Last Engineer — daily AI digest for engineers rooting for the robots."/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Space+Grotesk:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-bright": "#3a3939",
            "surface-container-high": "#2a2a2a",
            "surface-container": "#201f1f",
            "surface-container-low": "#1c1b1b",
            "surface-container-lowest": "#0e0e0e",
            "surface-container-highest": "#353534",
            "surface": "#131313",
            "background": "#131313",
            "primary": "#abd600",
            "on-primary": "#283500",
            "on-surface": "#e5e2e1",
            "on-background": "#e5e2e1",
            "outline": "#8e9192",
            "outline-variant": "#444748",
          },
          fontFamily: {
            "headline": ["Newsreader", "serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Space Grotesk", "monospace"]
          },
          borderRadius: {"DEFAULT": "0px"},
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; line-height: 1; }
    body { background-color: #131313; color: #e5e2e1; font-family: 'Inter', sans-serif; }
    .font-newsreader { font-family: 'Newsreader', serif; }
    .font-space-grotesk { font-family: 'Space Grotesk', monospace; }
  </style>
</head>
<body class="bg-background text-on-background selection:bg-primary selection:text-on-primary">

  <!-- Header -->
  <header class="bg-[#131313] sticky top-0 z-50">
    <div class="flex justify-between items-center w-full px-6 py-4 max-w-none bg-surface-container-low">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary">terminal</span>
        <a href="../" class="text-2xl font-newsreader italic text-primary uppercase tracking-widest hover:text-white transition-colors">The Last Engineer</a>
      </div>
      <div class="hidden md:flex items-center gap-8">
        <a class="text-outline font-space-grotesk uppercase text-[12px] tracking-widest hover:text-white transition-colors duration-300" href="../">Featured</a>
        <a class="text-primary font-space-grotesk uppercase text-[12px] tracking-widest" href="./">Archive</a>
      </div>
    </div>
  </header>

  <main class="min-h-screen pb-32">
    <section class="max-w-4xl mx-auto px-6 pt-12 md:pt-20">

      <!-- Title -->
      <div class="mb-16">
        <h2 class="text-5xl md:text-7xl font-newsreader italic tracking-tight mb-4">The Archive.</h2>
        <p class="text-outline font-body text-lg">Every issue, from the beginning.</p>
      </div>

      <!-- Metadata strip -->
      <div class="w-full bg-surface-container-lowest flex justify-between items-center px-4 py-2 mb-12 border-l-2 border-primary">
        <span class="font-label text-[10px] uppercase tracking-widest text-outline"><!-- ISSUE_COUNT_PLACEHOLDER -->0 issues</span>
        <div class="flex gap-6">
          <span class="font-label text-[10px] uppercase tracking-widest text-outline">Curator: Claude Sonnet</span>
          <span class="font-label text-[10px] uppercase tracking-widest text-primary">Status: Active</span>
        </div>
      </div>

      <!-- Issue list — injected by publish script -->
      <div id="archive-list" class="space-y-0">
        <!-- ARCHIVE_ENTRIES_PLACEHOLDER -->

</div>

    </section>
  </main>

  <!-- Mobile nav -->
  <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 bg-[#131313]/70 backdrop-blur-xl">
    <a class="flex flex-col items-center justify-center text-outline pt-2" href="../">
      <span class="material-symbols-outlined">auto_awesome</span>
      <span class="font-space-grotesk uppercase text-[10px] tracking-tighter">Featured</span>
    </a>
    <a class="flex flex-col items-center justify-center text-primary border-t-2 border-primary pt-2" href="./">
      <span class="material-symbols-outlined">inventory_2</span>
      <span class="font-space-grotesk uppercase text-[10px] tracking-tighter">Archive</span>
    </a>
  </nav>

</body>
</html>
