name: Daily Newsletter

on:
  schedule:
    # Every day at 7:00 AM UTC (adjust to your timezone)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Manual trigger from GitHub Actions UI

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for git push

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "theob0t"
          git config user.email "theo06bot75@gmail.com"

      - name: Run newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          GOOGLE_VOTES_CSV_URL: ${{ secrets.GOOGLE_VOTES_CSV_URL }}
        run: cd scripts && python run.py --push
